data:
  path: data/Dataset of motor insurance portfolio.csv
  sep: ;
  target_col: total_premium
  exposure_col: total_exposure
  objective: gamma
  filter_zeros: true
llm:
  model: claude-sonnet-4-6
  temperature: 0.2
validation:
  objective: gamma
  n_rounds: 300
  early_stopping_rounds: 50
  min_deviance_improvement_pct: 0.1
  min_exposure_per_cluster: 500
gbm:
  n_rounds: 300
  early_stopping_rounds: 50
  val_fraction: 0.2
  num_leaves: 63
  learning_rate: 0.05
  feature_fraction: 0.8
  bagging_fraction: 0.8
  model_path: reports/gbm_model.txt
  top_n_features: 15
  h_stat_n_sample: 500
  h_stat_grid_size: 20
output:
  report_path: reports/
  approval_log: reports/actuary_decisions.csv
features:
  numeric:
  - name: driver_age
    description: Age of the primary driver; strong non-linear risk factor with higher
      risk at young and very old ages.
    approved: true
  - name: vehicle_age
    description: Age of the insured vehicle in years; older vehicles typically have
      lower values but higher mechanical risk and different coverage mix.
    data_quality_note: Max of 68 years is plausible for classic vehicles but worth
      validating for data entry errors.
    approved: true
  - name: age_driving_licence
    description: Years since driving licence was obtained; proxy for driving experience,
      inversely related to risk.
    data_quality_note: Min of 0 may indicate newly licensed drivers; check consistency
      with driver_age (licence age + 18 should not exceed driver_age).
    approved: true
  - name: vehicle_value
    description: Market value of the insured vehicle; key driver of comprehensive
      and property damage premiums.
    data_quality_note: 0.14% nulls — observations with missing vehicle values to be
      excluded per actuary instruction; max of ~374k suggests high-value outliers
      — consider log transformation or capping.
    approved: true
    actuary_note: Exclude observations with missing vehicle values.
  - name: power_to_weight_ratio
    description: Vehicle performance metric; higher ratios associated with sportier
      driving behaviour and increased accident risk.
    data_quality_note: Min of 0 may indicate missing or electric vehicles; verify
      zero values are valid.
    approved: true
    actuary_note: I'm not sure if the issue is related to electric vehicle. Please
      check.
  - name: liability_exposure
    description: Fractional exposure for liability coverage; captures partial-year
      or partial-coverage periods for liability component.
    data_quality_note: Min of 0.0027 indicates very short exposure periods; ensure
      alignment with total_exposure.
    approved: true
    actuary_note: Please check if annual premium is reasonable for very short exposures.
  categorical:
  - name: policy_type
    description: Type of motor policy (e.g. comprehensive, third-party); directly
      determines coverage scope and expected premium level.
    ordinal: true
    order:
    - TP
    - TPG
    - CC
    - COMP_N
    - COMP_E
    n_clusters: 3
    approved: true
    grouping:
      comprehensive_standard:
      - CC
      - COMP_E
      comprehensive_restricted:
      - COMP_N
      - TPG
      third_party_only:
      - TP
  - name: business_type
    description: New business vs. renewal (portfolio); renewals may exhibit lower
      risk due to selection effects.
    ordinal: true
    order:
    - P
    - NB
    n_clusters: 2
    approved: true
    grouping:
      new_business:
      - NB
      renewal_portfolio:
      - P
  - name: payment_frequency
    description: Premium payment frequency (annual, semi-annual, quarterly); may correlate
      with customer segment and lapse risk.
    ordinal: false
    n_clusters: 2
    approved: true
    grouping:
      annual_payment:
      - A
      sub_annual_payment:
      - Q
      - S
  - name: bonus_score
    description: Bonus-malus or behavioural score category; direct indicator of past
      claims experience and future risk.
    ordinal: true
    order:
    - G
    - N
    - B
    n_clusters: 3
    approved: true
    grouping:
      good_risk:
      - G
      neutral_risk:
      - N
      bad_risk:
      - B
  - name: fuel_type
    description: Vehicle fuel type (diesel vs. petrol); correlates with vehicle usage
      patterns, mileage, and risk profile.
    ordinal: false
    n_clusters: 2
    data_quality_note: 0.36% nulls; to be recoded as 'Unknown' category per actuary
      instruction.
    approved: true
    actuary_note: Add "Unknown" as an explicit category for missing fuel type values
      rather than imputing.
    grouping:
      diesel_fuel:
      - D
      gasoline_fuel:
      - G
  - name: seats
    description: Number of seats in the vehicle; treated as categorical per actuary
      instruction — two-seaters are likely sportscars, vehicles with 4 or more seats
      are likely family cars.
    ordinal: false
    n_clusters: 3
    data_quality_note: Low cardinality (8 unique values); moved from numeric to categorical
      treatment per actuary instruction.
    approved: true
    actuary_note: Treat as categorical. Two seaters are likely sportscars, vehicles
      with 4 and more seats family cars.
    grouping:
      small_private_vehicle:
      - '2.0'
      - '3.0'
      - '4.0'
      standard_private_vehicle:
      - '5.0'
      large_multipurpose_vehicle:
      - '6.0'
      - '7.0'
      - '8.0'
      - '9.0'
  - name: vehicle_brand
    description: Manufacturer brand of the insured vehicle; proxy for vehicle segment,
      repair costs, and theft attractiveness.
    ordinal: false
    n_clusters: 8
    data_quality_note: 68 unique brands; low-frequency brands should be grouped into
      an 'Other' cluster to ensure statistical credibility.
    approved: true
    grouping:
      mass_market_french:
      - RENAULT
      - PEUGEOT
      - CITROEN
      mass_market_european:
      - VOLKSWAGEN
      - OPEL
      - SEAT
      - FORD
      mainstream_asian:
      - HYUNDAI
      - NISSAN
      - TOYOTA
      - KIA
      premium_german:
      - AUDI
      - BMW
      - MERCEDES
      compact_mainstream_european:
      - FIAT
      - SKODA
      - DACIA
      - DAEWOO
      mid_tier_generalist:
      - HONDA
      - MAZDA
      - MITSUBISHI
      - SUZUKI
      - CHEVROLET
      premium_niche_and_suv:
      - VOLVO
      - LAND ROVER
      - MINI
      - ALFA ROMEO
      - JEEP
      low_volume_residual:
      - CHRYSLER
      - LEXUS
      - ROVER
      - SAAB
      - SSANGYONG
  - name: municipality_type
    description: Classification of municipality (urban, intermediate, suburban); captures
      geographic risk density and traffic exposure.
    ordinal: true
    order:
    - I
    - IS
    - C
    n_clusters: 3
    approved: true
    grouping:
      urban_commercial:
      - C
      industrial_mixed:
      - I
      industrial_suburban:
      - IS
  - name: circulation_area
    description: Urban vs. rural circulation area; urban areas typically associated
      with higher frequency of minor accidents.
    ordinal: true
    order:
    - R
    - U
    n_clusters: 2
    approved: true
    grouping:
      rural_lower_risk:
      - R
      urban_higher_risk:
      - U
